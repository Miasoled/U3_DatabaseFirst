services:
  # Servicio de base de datos PostgreSQL con el esquema Sakila
  sakila-db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: sakila-postgres-custom
    container_name: sakila-postgres
    restart: always
    environment:
      POSTGRES_DB: sakila
      POSTGRES_USER: cruduser
      POSTGRES_PASSWORD: crud123
    ports:
      - "5432:5432"
    volumes:
      - sakila_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruduser -d sakila"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Servicio de la aplicación web ASP.NET Core (SakilaApp)
  sakila-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-app
    restart: always
    depends_on:
      sakila-db:
        condition: service_healthy
    environment:
      # Database — points to the postgres service by its Docker service name
      ConnectionStrings__DefaultConnection: "Host=sakila-db;Port=5432;Database=sakila;Username=cruduser;Password=crud123"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      # Google OAuth
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      # Gmail SMTP
      EmailSettings__SmtpServer: "smtp.gmail.com"
      EmailSettings__SmtpPort: "587"
      EmailSettings__SenderName: "${EMAIL_SENDER_NAME}"
      EmailSettings__SenderEmail: "${EMAIL_SENDER_EMAIL}"
      EmailSettings__Password: "${EMAIL_APP_PASSWORD}"
      # PayPal
      PayPal__ClientId: "${PAYPAL_CLIENT_ID}"
      PayPal__ClientSecret: "${PAYPAL_CLIENT_SECRET}"
      PayPal__BaseUrl: "https://api-m.sandbox.paypal.com"
      PayPal__ReturnUrl: "${PAYPAL_RETURN_URL}"
      PayPal__CancelUrl: "${PAYPAL_CANCEL_URL}"
      # PayPhone
      PayPhone__Token: "${PAYPHONE_TOKEN}"
      PayPhone__StoreId: "${PAYPHONE_STOREID}"
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    ports:
      - "8081:8080"

volumes:
  sakila_data:
  dataprotection_keys:
